<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <meta name="theme-color" content="#1a1a2e">
    <title>Paradise Dashboard</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { font-family: 'Inter', sans-serif; background: #0f0f1a; color: #e2e8f0; overflow-x: hidden; }
        .mobile-container { max-width: 100%; padding: 12px; padding-bottom: 80px; }
        
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; background: #1a1a2e; padding: 6px; border-radius: 16px; overflow-x: auto; }
        .tab-btn { flex: 1; padding: 10px 12px; border: none; background: transparent; color: #9ca3af; font-size: 0.8rem; border-radius: 12px; cursor: pointer; white-space: nowrap; }
        .tab-btn.active { background: linear-gradient(135deg, #667eea, #764ba2); color: white; }
        .tab-content { display: none; }
        .tab-content.active { display: block; }
        
        .mobile-header { background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 20px; padding: 16px; margin-bottom: 16px; }
        .mobile-header h1 { font-size: 1.3rem; margin-bottom: 4px; }
        .header-stats { display: flex; gap: 12px; margin-top: 10px; font-size: 0.7rem; flex-wrap: wrap; }
        .header-stats span { background: rgba(255,255,255,0.2); padding: 4px 8px; border-radius: 20px; }
        
        .search-section { margin-bottom: 16px; }
        .search-box { background: #1a1a2e; border-radius: 14px; padding: 12px 16px; display: flex; align-items: center; gap: 10px; margin-bottom: 10px; border: 1px solid #2d2d3f; }
        .search-box input { flex: 1; background: none; border: none; color: white; font-size: 0.9rem; outline: none; }
        .filters { display: flex; gap: 8px; flex-wrap: wrap; }
        .filters select, .filters input { flex: 1; background: #1a1a2e; border: 1px solid #2d2d3f; border-radius: 12px; padding: 10px 12px; color: white; font-size: 0.8rem; outline: none; }
        
        .action-buttons { display: flex; gap: 8px; margin-bottom: 16px; }
        .action-btn { flex: 1; padding: 10px; background: #1a1a2e; border: 1px solid #2d2d3f; border-radius: 12px; color: white; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 6px; }
        .action-btn.suspect { background: #7f1a1a; border-color: #991b1b; }
        .action-btn:active { transform: scale(0.97); }
        
        .stats-scroll { overflow-x: auto; margin-bottom: 16px; -webkit-overflow-scrolling: touch; }
        .stats-row { display: inline-flex; gap: 10px; padding: 2px; }
        .stat-item { background: #1a1a2e; border-radius: 16px; padding: 12px 16px; min-width: 130px; display: inline-flex; align-items: center; gap: 10px; border: 1px solid #2d2d3f; }
        .stat-icon { width: 40px; height: 40px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 12px; display: flex; align-items: center; justify-content: center; }
        .stat-info h3 { font-size: 1.2rem; font-weight: bold; }
        .stat-info p { font-size: 0.65rem; color: #9ca3af; }
        
        .chart-container { background: #1a1a2e; border-radius: 16px; padding: 16px; margin-bottom: 16px; border: 1px solid #2d2d3f; }
        .chart-container canvas { max-height: 200px; width: 100%; }
        
        #geoMap { height: 350px; border-radius: 16px; margin-bottom: 16px; z-index: 1; background: #1a1a2e; }
        
        .users-list { display: flex; flex-direction: column; gap: 12px; }
        .user-card { background: #1a1a2e; border-radius: 16px; padding: 14px; border: 1px solid #2d2d3f; cursor: pointer; }
        .user-card:active { transform: scale(0.98); }
        .user-card.suspect-bot { border-left: 3px solid #ef4444; background: #1f1a2e; }
        .user-card-header { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
        .user-avatar { width: 48px; height: 48px; background: linear-gradient(135deg, #667eea, #764ba2); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: bold; font-size: 1rem; flex-shrink: 0; }
        .user-info { flex: 1; min-width: 0; }
        .user-name { font-weight: 600; font-size: 0.9rem; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
        .user-stats { display: flex; gap: 12px; margin-top: 10px; padding-top: 10px; border-top: 1px solid #2d2d3f; font-size: 0.7rem; flex-wrap: wrap; }
        .user-stats span { display: flex; align-items: center; gap: 5px; color: #9ca3af; }
        .bot-badge { background: #ef4444; color: white; padding: 2px 8px; border-radius: 12px; font-size: 0.65rem; margin-left: 8px; }
        
        .smart-tips { background: linear-gradient(135deg, #1a1a2e, #16213e); border-radius: 16px; padding: 12px; margin-bottom: 16px; border: 1px solid #2d2d3f; }
        .tip-item { font-size: 0.75rem; padding: 8px 0; border-bottom: 1px solid #2d2d3f; display: flex; align-items: center; gap: 8px; }
        .tip-item:last-child { border-bottom: none; }
        
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.95); z-index: 2000; overflow-y: auto; }
        .modal.active { display: block; }
        .modal-content { background: #1a1a2e; min-height: 100vh; padding: 20px; }
        .modal-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; padding-bottom: 15px; border-bottom: 1px solid #2d2d3f; }
        .modal-close { background: none; border: none; color: white; font-size: 1.8rem; cursor: pointer; width: 44px; height: 44px; }
        .detail-section { margin-bottom: 20px; }
        .detail-row { background: #22223b; border-radius: 12px; padding: 12px; margin-bottom: 8px; word-break: break-word; }
        .timeline-item { background: #22223b; border-radius: 12px; padding: 12px; margin-bottom: 8px; font-size: 0.8rem; }
        .block-btn { background: #ef4444; border: none; padding: 12px; border-radius: 12px; color: white; width: 100%; margin-top: 16px; cursor: pointer; }
        
        @media (min-width: 768px) {
            .mobile-container { max-width: 1400px; margin: 0 auto; padding: 20px; }
            .stats-row { display: grid; grid-template-columns: repeat(5, 1fr); width: 100%; }
            .stat-item { min-width: auto; }
            .users-list { display: grid; grid-template-columns: repeat(auto-fill, minmax(350px, 1fr)); }
        }
    </style>
</head>
<body>
    <div class="mobile-container">
        <div class="mobile-header">
            <h1>👑 Paradise Dashboard</h1>
            <div class="header-stats">
                <span id="newUsersCount">🆕 Новых сегодня: 0</span>
            </div>
        </div>

        <div class="tabs">
            <button class="tab-btn active" data-tab="users">👥 Пользователи</button>
            <button class="tab-btn" data-tab="analytics">📊 Аналитика</button>
            <button class="tab-btn" data-tab="map">🗺️ Геокарта</button>
        </div>

        <div id="tab-users" class="tab-content active">
            <div class="smart-tips" id="smartTips"><div class="tip-item">💡 Анализирую данные...</div></div>

            <div class="search-section">
                <div class="search-box">
                    <i class="fas fa-search"></i>
                    <input type="text" id="searchInput" placeholder="Поиск по имени, ID или IP...">
                </div>
                <div class="filters">
                    <select id="countryFilter"><option value="">🌍 Все страны</option></select>
                    <input type="date" id="lastSeenFilter" placeholder="После даты">
                    <select id="deviceFilter"><option value="">📱 Все устройства</option>
                        <option value="Desktop">💻 Desktop</option>
                        <option value="Mobile">📱 Mobile</option>
                        <option value="iPhone">📱 iPhone</option>
                        <option value="Android">🤖 Android</option>
                        <option value="Tablet">📟 Tablet</option></select>
                </div>
            </div>

            <div class="action-buttons">
                <button class="action-btn" id="refreshBtn"><i class="fas fa-sync-alt"></i> Обновить</button>
                <button class="action-btn suspect" id="suspectBtn"><i class="fas fa-robot"></i> Подозрительные</button>
            </div>

            <div class="stats-scroll">
                <div class="stats-row">
                    <div class="stat-item"><div class="stat-icon"><i class="fas fa-users"></i></div><div class="stat-info"><h3 id="totalUsers">0</h3><p>Всего</p></div></div>
                    <div class="stat-item"><div class="stat-icon"><i class="fas fa-chart-line"></i></div><div class="stat-info"><h3 id="dailyActive">0</h3><p>Сегодня</p></div></div>
                    <div class="stat-item"><div class="stat-icon"><i class="fas fa-chart-simple"></i></div><div class="stat-info"><h3 id="weeklyActive">0</h3><p>За неделю</p></div></div>
                    <div class="stat-item"><div class="stat-icon"><i class="fas fa-calendar-week"></i></div><div class="stat-info"><h3 id="monthlyActive">0</h3><p>За месяц</p></div></div>
                    <div class="stat-item"><div class="stat-icon"><i class="fas fa-percent"></i></div><div class="stat-info"><h3 id="retentionRate">0%</h3><p>Удержание</p></div></div>
                </div>
            </div>

            <div id="usersList" class="users-list"></div>
        </div>

        <div id="tab-analytics" class="tab-content">
            <div class="chart-container"><canvas id="hourlyChart"></canvas></div>
            <div class="chart-container"><canvas id="retentionChart"></canvas></div>
        </div>

        <div id="tab-map" class="tab-content">
            <div id="geoMap"></div>
        </div>
    </div>

    <div id="userModal" class="modal">
        <div class="modal-content">
            <div class="modal-header"><h2>Детали пользователя</h2><button class="modal-close">&times;</button></div>
            <div id="modalBody"></div>
        </div>
    </div>

    <script>
        const GITHUB_RAW_URL = 'https://raw.githubusercontent.com/CyberCold/Paradise/main/users.json';
        let usersData = [], filteredUsers = [];
        let hourlyChart, retentionChart, map = null, mapMarkers = [];
        let showOnlySuspicious = false;

        // Функции для получения данных из JSON (адаптировано под твою структуру)
        function getUserCity(user) { 
            return user.ips?.[0]?.city || user.visits?.[0]?.city || user.request_history?.[0]?.city || null; 
        }
        function getUserCountry(user) { 
            return user.ips?.[0]?.country || user.visits?.[0]?.country || user.request_history?.[0]?.country || '—'; 
        }
        function getUserDevice(user) { 
            const ua = user.visits?.[0]?.user_agent || user.request_history?.[0]?.user_agent || '';
            if (ua.includes('iPhone')) return 'iPhone';
            if (ua.includes('Android')) return 'Android';
            if (ua.includes('iPad')) return 'iPad';
            if (ua.includes('Mobile')) return 'Mobile';
            if (ua.includes('Windows') || ua.includes('Mac')) return 'Desktop';
            return user.visits?.[0]?.device || '—';
        }
        function getUserIP(user) { 
            return user.ips?.[0]?.ip || user.request_history?.[0]?.ip || '—'; 
        }
        function getUserISP(user) { 
            return user.ips?.[0]?.isp || '—'; 
        }
        function getUserASN(user) { 
            return user.ips?.[0]?.asn || '—'; 
        }
        function getUserVisits(user) {
            return user.visits || [];
        }

        // Загрузка данных (без автообновления)
        async function loadUsers() {
            try {
                const response = await fetch(GITHUB_RAW_URL, { cache: 'no-store' });
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                usersData = Object.values(data);
                filteredUsers = [...usersData];
                
                updateStats();
                updateCharts();
                updateMap();
                updateSmartTips();
                populateFilters();
                renderUsers();
            } catch (error) {
                document.getElementById('usersList').innerHTML = `<div class="loading">❌ Ошибка: ${error.message}<br><button onclick="loadUsers()" style="margin-top:10px;padding:10px;background:#667eea;border:none;border-radius:10px;">Повторить</button></div>`;
            }
        }

        function updateStats() {
            const today = new Date().toISOString().split('T')[0];
            const weekAgo = new Date(Date.now() - 7*86400000).toISOString();
            const monthAgo = new Date(Date.now() - 30*86400000).toISOString();
            let daily = 0, weekly = 0, monthly = 0, newToday = 0;
            
            usersData.forEach(u => {
                if (u.last_seen && u.last_seen.split('T')[0] === today) daily++;
                if (u.last_seen && u.last_seen >= weekAgo) weekly++;
                if (u.last_seen && u.last_seen >= monthAgo) monthly++;
                if (u.registered && u.registered.split('T')[0] === today) newToday++;
            });
            
            let returned = 0, totalOld = 0;
            usersData.forEach(u => {
                if (u.registered && new Date(u.registered) < new Date(Date.now() - 7*86400000)) {
                    totalOld++;
                    if (u.last_seen && new Date(u.last_seen) > new Date(Date.now() - 7*86400000)) returned++;
                }
            });
            const retention = totalOld > 0 ? Math.round(returned / totalOld * 100) : 0;
            
            document.getElementById('totalUsers').textContent = usersData.length;
            document.getElementById('dailyActive').textContent = daily;
            document.getElementById('weeklyActive').textContent = weekly;
            document.getElementById('monthlyActive').textContent = monthly;
            document.getElementById('retentionRate').textContent = retention;
            document.getElementById('newUsersCount').innerHTML = `🆕 Новых сегодня: ${newToday}`;
        }

        function updateCharts() {
            const hourCounts = new Array(24).fill(0);
            usersData.forEach(u => {
                const ts = u.visits?.[0]?.timestamp || u.last_seen;
                if (ts) hourCounts[new Date(ts).getHours()]++;
            });
            
            if (hourlyChart) hourlyChart.destroy();
            const ctx1 = document.getElementById('hourlyChart').getContext('2d');
            hourlyChart = new Chart(ctx1, {
                type: 'line',
                data: { labels: [...Array(24).keys()], datasets: [{ label: 'Активность', data: hourCounts, borderColor: '#667eea', fill: false }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#e2e8f0' } } } }
            });
            
            const retentionData = [100];
            for (let day = 1; day <= 7; day++) {
                let returned = 0, total = 0;
                usersData.forEach(u => {
                    if (u.registered) {
                        const regDate = new Date(u.registered);
                        const checkDate = new Date(regDate.getTime() + day*86400000);
                        if (checkDate < new Date()) {
                            total++;
                            const visits = getUserVisits(u);
                            if (visits.some(v => new Date(v.timestamp) >= checkDate)) returned++;
                        }
                    }
                });
                retentionData.push(total > 0 ? Math.round(returned/total*100) : 0);
            }
            
            if (retentionChart) retentionChart.destroy();
            const ctx2 = document.getElementById('retentionChart').getContext('2d');
            retentionChart = new Chart(ctx2, {
                type: 'line',
                data: { labels: ['День 0', 'День 1', 'День 2', 'День 3', 'День 4', 'День 5', 'День 6', 'День 7'], 
                        datasets: [{ label: 'Удержание %', data: retentionData, borderColor: '#764ba2', fill: false }] },
                options: { responsive: true, maintainAspectRatio: true, plugins: { legend: { labels: { color: '#e2e8f0' } } } }
            });
        }

        // Карта с реальными координатами городов
        function updateMap() {
            if (!map) {
                map = L.map('geoMap').setView([56.9496, 24.1052], 5);
                L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png', {
                    attribution: '&copy; <a href="https://www.openstreetmap.org/copyright">OSM</a>'
                }).addTo(map);
            }
            
            mapMarkers.forEach(m => map.removeLayer(m));
            mapMarkers = [];
            
            // Координаты городов мира
            const cityCoords = {
                'Riga': [56.9496, 24.1052], 'Moscow': [55.7558, 37.6173], 'Saint Petersburg': [59.9343, 30.3351],
                'London': [51.5074, -0.1278], 'Berlin': [52.5200, 13.4050], 'Paris': [48.8566, 2.3522],
                'New York': [40.7128, -74.0060], 'Los Angeles': [34.0522, -118.2437], 'Chicago': [41.8781, -87.6298],
                'Tokyo': [35.6762, 139.6503], 'Osaka': [34.6937, 135.5023], 'Beijing': [39.9042, 116.4074],
                'Shanghai': [31.2304, 121.4737], 'Sydney': [-33.8688, 151.2093], 'Melbourne': [-37.8136, 144.9631],
                'Dubai': [25.2048, 55.2708], 'Istanbul': [41.0082, 28.9784], 'Rome': [41.9028, 12.4964],
                'Madrid': [40.4168, -3.7038], 'Amsterdam': [52.3676, 4.9041], 'Vienna': [48.2082, 16.3738],
                'Warsaw': [52.2297, 21.0122], 'Prague': [50.0755, 14.4378], 'Budapest': [47.4979, 19.0402],
                'Kyiv': [50.4501, 30.5234], 'Minsk': [53.9045, 27.5615], 'Almaty': [43.2220, 76.8512]
            };
            
            const cityCounts = new Map();
            usersData.forEach(u => {
                const city = getUserCity(u);
                if (city && cityCounts.has(city)) {
                    cityCounts.set(city, cityCounts.get(city) + 1);
                } else if (city) {
                    cityCounts.set(city, 1);
                }
            });
            
            let hasMarkers = false;
            cityCounts.forEach((count, city) => {
                const coords = cityCoords[city];
                if (coords) {
                    hasMarkers = true;
                    const radius = Math.min(30, 8 + Math.floor(count / 2));
                    const marker = L.circleMarker(coords, {
                        radius: radius,
                        fillColor: '#667eea',
                        color: '#764ba2',
                        weight: 2,
                        opacity: 1,
                        fillOpacity: 0.7
                    }).addTo(map);
                    marker.bindPopup(`<b>${city}</b><br>👥 ${count} пользователей`);
                    mapMarkers.push(marker);
                }
            });
            
            if (!hasMarkers && cityCounts.size > 0) {
                // Если нет совпадений в словаре, показываем центр
                map.setView([50, 10], 4);
            } else if (hasMarkers) {
                // Центрируем на первый маркер
                const firstCity = Array.from(cityCounts.keys())[0];
                const coords = cityCoords[firstCity];
                if (coords) map.setView(coords, 5);
            }
        }

        function isSuspiciousBot(user) {
            const suspiciousUA = /bot|crawler|scraper|curl|python|java|php|wget|headless/i.test(JSON.stringify(user));
            const manyIPs = (user.ips?.length || 0) > 3;
            const countries = new Set();
            user.ips?.forEach(ip => countries.add(ip.country));
            const manyCountries = countries.size > 2;
            return suspiciousUA || manyIPs || manyCountries;
        }

        function updateSmartTips() {
            const tips = [];
            const hourCounts = new Array(24).fill(0);
            usersData.forEach(u => { if (u.last_seen) hourCounts[new Date(u.last_seen).getHours()]++; });
            const peakHour = hourCounts.indexOf(Math.max(...hourCounts));
            tips.push(`📊 Пик активности в ${peakHour}:00 — ${Math.max(...hourCounts)} пользователей`);
            
            const suspicious = usersData.filter(isSuspiciousBot);
            if (suspicious.length > 0) tips.push(`🤖 Обнаружено ${suspicious.length} подозрительных ботов`);
            
            const newToday = usersData.filter(u => u.registered && u.registered.split('T')[0] === new Date().toISOString().split('T')[0]).length;
            if (newToday > 0) tips.push(`🆕 ${newToday} новых пользователей сегодня!`);
            
            document.getElementById('smartTips').innerHTML = tips.map(t => `<div class="tip-item">💡 ${t}</div>`).join('');
        }

        function populateFilters() {
            const countries = new Set();
            usersData.forEach(u => { const c = getUserCountry(u); if (c !== '—') countries.add(c); });
            const countrySelect = document.getElementById('countryFilter');
            countrySelect.innerHTML = '<option value="">🌍 Все страны</option>';
            Array.from(countries).sort().forEach(c => {
                const opt = document.createElement('option');
                opt.value = c; opt.textContent = c;
                countrySelect.appendChild(opt);
            });
        }
        
        function applyFilters() {
            const search = document.getElementById('searchInput').value.toLowerCase();
            const country = document.getElementById('countryFilter').value;
            const lastSeenDate = document.getElementById('lastSeenFilter').value;
            const device = document.getElementById('deviceFilter').value;
            
            filteredUsers = usersData.filter(u => {
                const matchSearch = !search || u.id.toString().includes(search) || 
                    (u.first_name && u.first_name.toLowerCase().includes(search)) || 
                    (u.username && u.username.toLowerCase().includes(search)) || 
                    getUserIP(u).includes(search);
                const matchCountry = !country || getUserCountry(u) === country;
                const matchLastSeen = !lastSeenDate || (u.last_seen && u.last_seen.split('T')[0] >= lastSeenDate);
                const matchDevice = !device || getUserDevice(u) === device;
                const matchSuspicious = !showOnlySuspicious || isSuspiciousBot(u);
                return matchSearch && matchCountry && matchLastSeen && matchDevice && matchSuspicious;
            });
            renderUsers();
        }

        function renderUsers() {
            const container = document.getElementById('usersList');
            if (filteredUsers.length === 0) { container.innerHTML = '<div class="loading">👤 Пользователи не найдены</div>'; return; }
            
            container.innerHTML = filteredUsers.map(user => {
                let name = user.first_name || 'Без имени';
                // Исправляем кракозябры
                name = name.replace(/[ÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂÃÂ]/g, '');
                if (name.length > 20) name = name.substring(0, 20) + '...';
                const username = (user.username && user.username !== '') ? user.username : 'нет username';
                const country = getUserCountry(user);
                const device = getUserDevice(user);
                const initials = name !== 'Без имени' && name.length > 0 ? name.charAt(0).toUpperCase() : '?';
                const isBot = isSuspiciousBot(user);
                
                return `<div class="user-card ${isBot ? 'suspect-bot' : ''}" onclick="showUserDetails(${user.id})">
                    <div class="user-card-header">
                        <div class="user-avatar">${initials}</div>
                        <div class="user-info">
                            <div class="user-name">${escapeHtml(name)} ${isBot ? '<span class="bot-badge">🤖 Бот</span>' : ''}</div>
                            <div class="user-username">@${escapeHtml(username)}</div>
                        </div>
                    </div>
                    <div class="user-stats">
                        <span><i class="fas fa-chart-simple"></i> ${user.visit_count || 0} виз.</span>
                        <span><i class="fas fa-map-marker-alt"></i> ${country}</span>
                        <span><i class="fas fa-mobile-alt"></i> ${device}</span>
                        <span><i class="fas fa-clock"></i> ${formatRelativeTime(user.last_seen)}</span>
                    </div>
                </div>`;
            }).join('');
        }

        window.showUserDetails = function(userId) {
            const user = usersData.find(u => u.id === userId);
            if (!user) return;
            
            const visits = getUserVisits(user);
            const requestHistory = user.request_history || [];
            const allVisits = [...visits, ...requestHistory].sort((a,b) => new Date(b.timestamp) - new Date(a.timestamp));
            
            const timeline = allVisits.map(v => `
                <div class="timeline-item">
                    <small>${new Date(v.timestamp).toLocaleString()}</small>
                    <p>📍 ${v.country || '—'} / ${v.city || '—'}</p>
                    <p>📱 ${v.device || (v.user_agent?.includes('iPhone') ? 'iPhone' : v.user_agent?.includes('Android') ? 'Android' : '—')}</p>
                    <p>🔗 ${v.referrer || v.referer || 'прямой переход'}</p>
                    <p style="font-size: 0.7rem; color: #888;">${v.user_agent ? truncate(v.user_agent, 80) : '—'}</p>
                </div>
            `).join('');
            
            let name = user.first_name || 'Без имени';
            name = name.replace(/[ÃÂÃÂÃÂÃÂ]/g, '');
            
            const modalBody = document.getElementById('modalBody');
            modalBody.innerHTML = `
                <div class="detail-section">
                    <h4>Основная информация</h4>
                    <div class="detail-row">
                        <p><strong>${escapeHtml(name)}</strong></p>
                        <p>@${escapeHtml(user.username || 'нет username')}</p>
                        <p>ID: ${user.id}</p>
                        <p>📅 Регистрация: ${new Date(user.registered).toLocaleString()}</p>
                        <p>🕐 Последний визит: ${new Date(user.last_seen).toLocaleString()}</p>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h4>🌍 Геолокация</h4>
                    <div class="detail-row">
                        <p>🌍 Страна: ${getUserCountry(user)}</p>
                        <p>🏙️ Город: ${getUserCity(user) || '—'}</p>
                        <p>📡 IP: ${getUserIP(user)}</p>
                        <p>🏢 ISP: ${getUserISP(user)}</p>
                        <p>🆔 ASN: ${getUserASN(user)}</p>
                    </div>
                </div>
                
                <div class="detail-section">
                    <h4>📜 История визитов (${allVisits.length})</h4>
                    ${timeline || '<p>Нет данных о визитах</p>'}
                </div>
                
                <button class="block-btn" onclick="blockUser(${user.id})">
                    <i class="fas fa-ban"></i> Добавить в черный список
                </button>
            `;
            document.getElementById('userModal').classList.add('active');
        };

        window.blockUser = function(userId) {
            if (confirm('Заблокировать пользователя?')) {
                let blacklist = JSON.parse(localStorage.getItem('blacklist') || '[]');
                if (!blacklist.includes(userId)) blacklist.push(userId);
                localStorage.setItem('blacklist', JSON.stringify(blacklist));
                alert('✅ Пользователь добавлен в черный список');
            }
        };

        function truncate(str, max) { if (!str) return '—'; return str.length > max ? str.substring(0, max) + '...' : str; }
        function escapeHtml(str) { if (!str) return ''; return str.replace(/[&<>]/g, m => ({'&':'&amp;','<':'&lt;','>':'&gt;'}[m])); }
        function formatRelativeTime(dateStr) {
            if (!dateStr) return '—';
            const diff = Date.now() - new Date(dateStr);
            const days = Math.floor(diff / 86400000);
            if (days === 0) return 'сегодня';
            if (days === 1) return 'вчера';
            if (days < 7) return `${days} дн.`;
            return new Date(dateStr).toLocaleDateString();
        }

        // Инициализация
        document.addEventListener('DOMContentLoaded', () => {
            loadUsers();
            
            document.getElementById('searchInput').addEventListener('input', applyFilters);
            document.getElementById('countryFilter').addEventListener('change', applyFilters);
            document.getElementById('lastSeenFilter').addEventListener('change', applyFilters);
            document.getElementById('deviceFilter').addEventListener('change', applyFilters);
            document.getElementById('refreshBtn').addEventListener('click', loadUsers);
            document.getElementById('suspectBtn').addEventListener('click', () => {
                showOnlySuspicious = !showOnlySuspicious;
                document.getElementById('suspectBtn').style.background = showOnlySuspicious ? '#ef4444' : '#1a1a2e';
                applyFilters();
            });
            
            document.querySelectorAll('.tab-btn').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
                    document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
                    btn.classList.add('active');
                    document.getElementById(`tab-${btn.dataset.tab}`).classList.add('active');
                    if (btn.dataset.tab === 'map') setTimeout(() => map?.invalidateSize(), 100);
                });
            });
            
            const modal = document.getElementById('userModal');
            document.querySelector('.modal-close').onclick = () => modal.classList.remove('active');
            modal.onclick = (e) => { if (e.target === modal) modal.classList.remove('active'); };
        });
    </script>
</body>
</html>
